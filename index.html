  <script>
    // Parse data: [created, new, attempting, connected, prequalified, qualified]
    const STAGE_KEYS = ['new','attempting','connected','prequalified','qualified'];
    const STAGE_NAMES = ['New','Attempting','Connected','Pre-Qualified','Qualified'];
    const STAGE_COLORS = ['#4a90d9','#50b5a9','#7c6bbf','#e8a838','#e8636f'];
    const DROP_COLOR = '#c4a0ab';

    const leads = LEADS_RAW.map(r => ({
      created: r[0] ? new Date(r[0]) : null,
      stages: r.slice(1).map(d => d ? new Date(d) : null),
    }));

    function getQuarter(d) {
      const q = Math.floor(d.getMonth() / 3) + 1;
      return `${d.getFullYear()}-Q${q}`;
    }

    // State
    let activeQuarters = new Set(['all']);

    function filterLeads() {
      if (activeQuarters.has('all')) return leads;
      return leads.filter(l => l.created && activeQuarters.has(getQuarter(l.created)));
    }

    function compute(filtered) {
      const counts = STAGE_KEYS.map((_, i) => filtered.filter(l => l.stages[i] !== null).length);
      const avgDays = [null];
      for (let i = 1; i < STAGE_KEYS.length; i++) {
        let sum = 0, n = 0;
        for (const l of filtered) {
          if (l.stages[i] && l.stages[i-1]) {
            const diff = (l.stages[i] - l.stages[i-1]) / (1000*60*60*24);
            if (diff >= 0) { sum += diff; n++; }
          }
        }
        avgDays.push(n > 0 ? (sum / n) : null);
      }
      return { counts, avgDays };
    }

    function draw() {
      const filtered = filterLeads();
      const { counts, avgDays } = compute(filtered);

      // Update subtitle
      const qLabel = activeQuarters.has('all') ? 'All quarters' : [...activeQuarters].sort().join(', ');
      document.getElementById('subtitle').textContent =
        `${filtered.length.toLocaleString()} leads · ${qLabel} · Avg transition time between stages`;

      // Canvas setup
      const canvas = document.getElementById('sankey');
      const dpr = window.devicePixelRatio || 1;
      const W = 1000, H = 400;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, W, H);

      const padL = 60, padR = 60, mainBandY = 70;
      const nodeW = 14;
      const maxCount = Math.max(...counts, 1);
      const maxBandH = 170;
      const usableW = W - padL - padR - nodeW;
      const colSpacing = usableW / (STAGE_KEYS.length - 1);

      function bandH(c) { return Math.max(4, (c / maxCount) * maxBandH); }

      const nodes = STAGE_NAMES.map((name, i) => {
        const x = padL + i * colSpacing;
        const h = bandH(counts[i]);
        const y = mainBandY + (maxBandH - h) / 2;
        return { name, count: counts[i], color: STAGE_COLORS[i], x, y, h };
      });

      // Forward flow bands
      for (let i = 0; i < nodes.length - 1; i++) {
        const from = nodes[i], to = nodes[i + 1];
        const flowH_from = bandH(to.count);
        const fromX = from.x + nodeW, toX = to.x;

        const grad = ctx.createLinearGradient(fromX, 0, toX, 0);
        grad.addColorStop(0, hexAlpha(from.color, 0.35));
        grad.addColorStop(1, hexAlpha(to.color, 0.35));
        drawBand(ctx, fromX, from.y, flowH_from, toX, to.y, to.h, grad);
      }

      for (let i = 0; i < nodes.length - 1; i++) {
        const node = nodes[i], next = nodes[i + 1];
        const dropCount = node.count - next.count;
        if (dropCount <= 0) continue;

        const dropH = bandH(dropCount);
        const flowH = bandH(next.count);
        const startX = node.x + nodeW;
        const startY = node.y + flowH;

        // Curve down and to the right, thinning out
        const endX = startX + colSpacing * 0.4;
        const endY = mainBandY + maxBandH + 40 + i * 12;
        const tailH = Math.max(3, dropH * 0.25);

        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        const cp1x = startX + (endX - startX) * 0.15;
        const cp2x = startX + (endX - startX) * 0.5;
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(cp1x, startY, cp2x, endY, endX, endY);
        ctx.lineTo(endX, endY + tailH);
        ctx.bezierCurveTo(cp2x, endY + tailH, cp1x, startY + dropH, startX, startY + dropH);
        ctx.closePath();
        ctx.fillStyle = DROP_COLOR;
        ctx.fill();
        ctx.globalAlpha = 1;

        // Drop label
        ctx.font = '11px -apple-system, sans-serif';
        ctx.fillStyle = '#9e6b7b';
        ctx.textAlign = 'left';
        ctx.fillText('-' + dropCount.toLocaleString(), endX + 6, endY + tailH / 2 + 4);
      }

      // Node bars + labels
      nodes.forEach((n, i) => {
        // Bar
        ctx.fillStyle = n.color;
        roundRect(ctx, n.x, n.y, nodeW, n.h, 4);
        ctx.fill();

        // Stage name
        ctx.font = 'bold 13px -apple-system, sans-serif';
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        const labelX = n.x + nodeW / 2;
        ctx.fillText(n.name, labelX, n.y - 22);

        // Count
        ctx.font = 'bold 17px -apple-system, sans-serif';
        ctx.fillStyle = n.color;
        ctx.fillText(n.count.toLocaleString(), labelX, n.y - 6);

        // Avg transition time above the band
        if (avgDays[i] !== null) {
          const prev = nodes[i - 1];
          const midX = (prev.x + nodeW + n.x) / 2;
          const midY = Math.min(prev.y, n.y) - 6;
          ctx.font = '11px -apple-system, sans-serif';
          ctx.fillStyle = '#999';
          ctx.textAlign = 'center';
          ctx.fillText('~' + avgDays[i].toFixed(1) + 'd', midX, midY);
        }
      });

      // Update metric cards
      const metricsEl = document.getElementById('metrics');
      metricsEl.innerHTML = nodes.map((n, i) => {
        const drop = i < nodes.length - 1 ? n.count - nodes[i+1].count : 0;
        const convPct = i > 0 && nodes[i-1].count > 0
          ? ((n.count / nodes[i-1].count) * 100).toFixed(1) : null;
        const dayStr = avgDays[i] !== null ? avgDays[i].toFixed(1) : null;

        let detail = '';
        if (dayStr) detail += `<span class="time">~${dayStr}d</span> avg transition<br>`;
        if (convPct) detail += `<span class="conv">${convPct}% conversion</span><br>`;
        if (drop > 0) detail += `<span class="drop">${drop.toLocaleString()} dropped</span>`;
        if (i === 0 && drop > 0) detail = `<span class="drop">${drop.toLocaleString()} never advanced</span>`;

        return `<div class="metric-card">
          <div class="stage">${n.name}</div>
          <div class="count" style="color:${n.color}">${n.count.toLocaleString()}</div>
          <div class="detail">${detail}</div>
        </div>`;
      }).join('');
    }

    // Filter pill interaction
    document.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const q = pill.dataset.q;
        if (q === 'all') {
          activeQuarters = new Set(['all']);
        } else {
          activeQuarters.delete('all');
          if (activeQuarters.has(q)) {
            activeQuarters.delete(q);
            if (activeQuarters.size === 0) activeQuarters.add('all');
          } else {
            activeQuarters.add(q);
          }
        }
        // Update pill styles
        document.querySelectorAll('.pill').forEach(p => {
          p.classList.toggle('active',
            p.dataset.q === 'all' ? activeQuarters.has('all') : activeQuarters.has(p.dataset.q));
        });
        draw();
      });
    });

    // Drawing helpers
    function drawBand(ctx, x1, y1, h1, x2, y2, h2, fill) {
      const cpx1 = x1 + (x2 - x1) * 0.4, cpx2 = x1 + (x2 - x1) * 0.6;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.bezierCurveTo(cpx1, y1, cpx2, y2, x2, y2);
      ctx.lineTo(x2, y2 + h2);
      ctx.bezierCurveTo(cpx2, y2 + h2, cpx1, y1 + h1, x1, y1 + h1);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
    }
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
      ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
      ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();
    }
    function hexAlpha(hex, a) {
      return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
    }

    // Initial draw
    draw();
    window.addEventListener('resize', draw);
  </script>
</body>
</html>
