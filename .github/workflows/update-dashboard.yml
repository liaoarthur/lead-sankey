name: Update Sankey Dashboards

on:
  schedule:
    # Every day at 8am UTC (adjust for your timezone)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch HubSpot data and rebuild dashboard
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Get date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated dashboard to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html deals.html
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update dashboard data ${{ steps.date.outputs.today }}"
            git push
          fi
