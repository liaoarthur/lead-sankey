name: Update Sankey Dashboards

on:
  schedule:
    # Every day at 8am UTC (adjust for your timezone)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch HubSpot data and rebuild dashboard
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Get date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create or update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update dashboard data ${{ steps.date.outputs.today }}"
          title: "Update Sankey dashboard data (${{ steps.date.outputs.today }})"
          body: |
            Automated daily refresh of HubSpot lead/deal data.

            Rebuilt `index.html` and `deals.html` from the latest HubSpot export.
            Review the diff, then merge to publish to GitHub Pages.
          branch: auto/dashboard-update
          delete-branch: true
          add-paths: |
            index.html
            deals.html
